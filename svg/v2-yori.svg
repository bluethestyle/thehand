<svg xmlns="http://www.w3.org/2000/svg" width="768" height="868" viewBox="0 0 768 868"><rect width="768" height="868" fill="#FDFCFB"></rect><text x="384" y="44" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="11" font-weight="700" fill="#9A8F80" text-anchor="middle" letter-spacing="4">THE HAND</text><line x1="289" y1="72" x2="343" y2="72" stroke="#D8D0C4" stroke-width="1"></line><line x1="425" y1="72" x2="479" y2="72" stroke="#D8D0C4" stroke-width="1"></line><text x="384" y="78" font-family="Noto Serif KR, serif" font-size="28" font-weight="700" fill="#2D3436" text-anchor="middle" letter-spacing="3">料理</text><text x="384" y="104" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="12" font-weight="400" fill="#636E72" text-anchor="middle">제철 재료로 그날그날 · ½ 표시는 하프 사이즈 가능</text><text x="28" y="138" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="13" font-weight="800" fill="#C8902F" text-anchor="start">메인</text><line x1="28" y1="146" x2="740" y2="146" stroke="#EDE8E0" stroke-width="1"></line><text x="28" y="175" font-family="Noto Serif KR, serif" font-size="17" font-weight="700" fill="#2D3436" text-anchor="start">숙성 광어 사시미</text><text x="191" y="175" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="11.5" font-weight="400" fill="#9A8F80" text-anchor="start">(광어 국내산(양식))</text><rect x="337" y="163" width="36" height="16" rx="8" fill="#FBF1DC"></rect><text x="355" y="175" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="10" font-weight="800" fill="#A9761C" text-anchor="middle">추천</text><text x="28" y="197" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="12.5" font-weight="400" fill="#5C564E" text-anchor="start">5일 저온 숙성으로 끌어올린 감칠맛.</text><text x="740" y="176" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#2D3436" text-anchor="end">38,000</text><text x="740" y="192" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="10" font-weight="400" fill="#9A8F80" text-anchor="end">½ 하프 20,000</text><line x1="28" y1="208" x2="740" y2="208" stroke="#EDE8E0" stroke-width="1"></line><text x="28" y="237" font-family="Noto Serif KR, serif" font-size="17" font-weight="700" fill="#2D3436" text-anchor="start">제철 모둠 니기리 (5pc)</text><text x="293" y="237" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="11.5" font-weight="400" fill="#9A8F80" text-anchor="start">(쌀 국내산)</text><text x="28" y="259" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="12.5" font-weight="400" fill="#5C564E" text-anchor="start">그날 들어온 생선으로 쥐는 다섯 점.</text><text x="740" y="238" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#2D3436" text-anchor="end">24,000</text><line x1="28" y1="270" x2="740" y2="270" stroke="#EDE8E0" stroke-width="1"></line><text x="28" y="299" font-family="Noto Serif KR, serif" font-size="17" font-weight="700" fill="#2D3436" text-anchor="start">와규 수비드 스테이크</text><text x="225" y="299" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="11.5" font-weight="400" fill="#9A8F80" text-anchor="start">(소고기 호주산)</text><rect x="336.5" y="287" width="36" height="16" rx="8" fill="#FBF1DC"></rect><text x="354.5" y="299" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="10" font-weight="800" fill="#A9761C" text-anchor="middle">추천</text><text x="28" y="321" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="12.5" font-weight="400" fill="#5C564E" text-anchor="start">저온 조리 후 토치로 마무리. 와사비 소금과.</text><text x="740" y="300" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#2D3436" text-anchor="end">42,000</text><line x1="28" y1="332" x2="740" y2="332" stroke="#EDE8E0" stroke-width="1"></line><text x="28" y="361" font-family="Noto Serif KR, serif" font-size="17" font-weight="700" fill="#2D3436" text-anchor="start">가지모찌</text><text x="106" y="361" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="11.5" font-weight="400" fill="#9A8F80" text-anchor="start">(가지 국내산)</text><text x="28" y="383" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="12.5" font-weight="400" fill="#5C564E" text-anchor="start">튀긴 가지와 모찌, 가다랑어포를 듬뿍.</text><text x="740" y="362" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#2D3436" text-anchor="end">16,000</text><text x="28" y="418" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="13" font-weight="800" fill="#C8902F" text-anchor="start">추가 안주</text><line x1="28" y1="426" x2="740" y2="426" stroke="#EDE8E0" stroke-width="1"></line><text x="28" y="455" font-family="Noto Serif KR, serif" font-size="17" font-weight="700" fill="#2D3436" text-anchor="start">모둠 튀김</text><text x="123" y="455" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="11.5" font-weight="400" fill="#9A8F80" text-anchor="start">(새우 베트남산)</text><text x="28" y="477" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="12.5" font-weight="400" fill="#5C564E" text-anchor="start">제철 채소와 새우의 바삭한 덴푸라.</text><text x="740" y="456" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#2D3436" text-anchor="end">18,000</text><line x1="28" y1="488" x2="740" y2="488" stroke="#EDE8E0" stroke-width="1"></line><text x="28" y="517" font-family="Noto Serif KR, serif" font-size="17" font-weight="700" fill="#2D3436" text-anchor="start">이나니와 붓가케 우동</text><text x="28" y="539" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="12.5" font-weight="400" fill="#5C564E" text-anchor="start">가늘고 매끈한 면을 차갑게.</text><text x="740" y="518" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#2D3436" text-anchor="end">14,000</text><line x1="28" y1="550" x2="740" y2="550" stroke="#EDE8E0" stroke-width="1"></line><text x="28" y="579" font-family="Noto Serif KR, serif" font-size="17" font-weight="700" fill="#2D3436" text-anchor="start">매실소스 가지볶음</text><text x="191" y="579" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="11.5" font-weight="400" fill="#9A8F80" text-anchor="start">(가지 국내산)</text><text x="28" y="601" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="12.5" font-weight="400" fill="#5C564E" text-anchor="start">새콤달콤 매실 소스에 볶은 가지.</text><text x="740" y="580" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#2D3436" text-anchor="end">13,000</text><text x="28" y="636" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="13" font-weight="800" fill="#C8902F" text-anchor="start">계절 메뉴</text><line x1="28" y1="644" x2="740" y2="644" stroke="#EDE8E0" stroke-width="1"></line><text x="28" y="673" font-family="Noto Serif KR, serif" font-size="17" font-weight="700" fill="#2D3436" text-anchor="start">여름 냉소바</text><text x="140" y="673" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="11.5" font-weight="400" fill="#9A8F80" text-anchor="start">(메밀 중국산)</text><rect x="240" y="661" width="36" height="16" rx="8" fill="#E2F1EE"></rect><text x="258" y="673" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="10" font-weight="800" fill="#1F7A6E" text-anchor="middle">계절</text><text x="28" y="695" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="12.5" font-weight="400" fill="#5C564E" text-anchor="start">시원한 가다랑어 육수에 즐기는 메밀.</text><text x="740" y="674" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#2D3436" text-anchor="end">15,000</text><line x1="28" y1="706" x2="740" y2="706" stroke="#EDE8E0" stroke-width="1"></line><text x="28" y="735" font-family="Noto Serif KR, serif" font-size="17" font-weight="700" fill="#2D3436" text-anchor="start">한치 숙회</text><text x="123" y="735" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="11.5" font-weight="400" fill="#9A8F80" text-anchor="start">(한치 국내산)</text><rect x="223" y="723" width="47" height="16" rx="8" fill="#F39C12"></rect><text x="246.5" y="735" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="10" font-weight="800" fill="#2D3436" text-anchor="middle">NEW</text><text x="28" y="757" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="12.5" font-weight="400" fill="#5C564E" text-anchor="start">쫄깃한 한치를 살짝 데쳐 초장과.</text><text x="740" y="736" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="15" font-weight="700" fill="#2D3436" text-anchor="end">26,000</text><text x="740" y="752" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="10" font-weight="400" fill="#9A8F80" text-anchor="end">½ 하프 14,000</text><rect x="28" y="784" width="712" height="40" rx="10" fill="#F5F1EC"></rect><text x="384" y="809" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="13" font-weight="600" fill="#B26B00" text-anchor="middle">알레르기가 있으시면 주문 전 직원에게 꼭 문의해 주세요</text><text x="384" y="842" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="11" font-weight="400" fill="#9A8F80" text-anchor="middle">∗ 자세한 원산지 표기는 메뉴판 마지막 「원산지 표기」 페이지를 확인해 주세요 ∗</text></svg>